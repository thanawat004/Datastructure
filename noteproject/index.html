<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 Modern Notes Plus</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Prompt',sans-serif
}

body{
min-height:100vh;
background:linear-gradient(135deg,#e0e7ff,#c7d2fe);
padding:40px 20px;
}

.container{
max-width:1100px;
margin:auto
}

h1{
text-align:center;
margin-bottom:10px;
font-size:38px;
color:#1e293b
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
margin-bottom:30px
}

input,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #e2e8f0;
margin-bottom:12px;
font-size:14px
}

textarea{
resize:none;
height:90px
}

.flex{
display:flex;
gap:10px;
flex-wrap:wrap
}

button{
padding:10px 18px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s
}

.add-btn{
background:#4f46e5;
color:white
}

.edit-btn{
background:#3b82f6;
color:white;
padding:6px 10px;
border-radius:8px
}

.stats-bar{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:15px 20px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
font-size:14px
}

.filter-btn{
background:#f59e0b;
color:white;
border-radius:10px;
padding:6px 12px
}

.notes-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px
}

.note{
padding:18px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
justify-content:space-between;
transition:0.3s
}

.note:hover{
transform:scale(1.03)
}

.note-footer{
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:12px
}

.delete-btn{
background:#ef4444;
color:white;
padding:6px 10px;
border-radius:8px
}

.pin-btn{
background:#f59e0b;
color:white;
padding:6px 10px;
border-radius:8px;
margin-right:5px
}

.dark-mode{
background:#111827
}

.dark-mode .card,
.dark-mode .stats-bar{
background:#1f2937;
color:white
}

.dark-mode input,
.dark-mode textarea{
background:#374151;
color:white;
border:1px solid #555
}

.credit{
text-align:center;
margin-top:40px;
font-size:14px;
color:#475569
}

</style>
</head>

<body>

<div class="container">

<h1>📝 Modern Notes Plus ✨</h1>

<div class="stats-bar">
<div>🗒 จำนวนโน้ต: <strong id="noteCount">0</strong></div>
<div>📌 ปักหมุด: <strong id="pinCount">0</strong></div>

<div>
<button class="filter-btn" onclick="togglePinnedView()">📌 แสดงเฉพาะที่ปักหมุด</button>
<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</div>
</div>

<div class="card">

<input type="text" id="title" placeholder="หัวข้อโน้ต...">

<textarea id="content" placeholder="เขียนโน้ตของคุณ..."></textarea>

<div class="flex">
<input type="text" id="search" placeholder="ค้นหาโน้ต...">
<button class="add-btn" onclick="addNote()" id="addBtn">➕ เพิ่มโน้ต</button>
</div>

</div>

<div class="notes-grid" id="notesGrid"></div>

<div class="credit">
เครดิตผู้พัฒนาเว็บไซต์ <br>
ผู้สร้าง : <b>นาย ธนวัฒน์ ไตรปิฏก</b> <br>
รหัสนักศึกษา : <b>684245004</b>
</div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem('notes_plus')) || [];
let showPinnedOnly = false;
let editingId = null;

function save(){
localStorage.setItem('notes_plus', JSON.stringify(notes));
}

function updateStats(){

document.getElementById('noteCount').innerText = notes.length;

document.getElementById('pinCount').innerText =
notes.filter(n=>n.pinned).length;

}

function randomColor(){

const colors=['#fef3c7','#dbeafe','#fce7f3','#dcfce7','#ede9fe'];

return colors[Math.floor(Math.random()*colors.length)];

}

function addNote(){

const title=document.getElementById('title').value.trim();
const content=document.getElementById('content').value.trim();

if(!title && !content) return;

if(editingId){

notes = notes.map(n =>
n.id === editingId
? {...n,title,content}
: n
)

editingId = null
document.getElementById("addBtn").innerText="➕ เพิ่มโน้ต"

}else{

notes.unshift({

id:Date.now(),
title:title||"ไม่มีหัวข้อ",
content,
date:new Date().toLocaleString(),
color:randomColor(),
pinned:false

});

}

document.getElementById('title').value="";
document.getElementById('content').value="";

save();
render();
updateStats();

}

function deleteNote(id){

notes=notes.filter(n=>n.id!==id)

save();
render();
updateStats();

}

function togglePin(id){

notes=notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n)

save();
render();
updateStats();

}

function editNote(id){

const note = notes.find(n => n.id === id)

document.getElementById("title").value = note.title
document.getElementById("content").value = note.content

editingId = id

document.getElementById("addBtn").innerText="💾 บันทึกการแก้ไข"

window.scrollTo({top:0,behavior:"smooth"})

}

function togglePinnedView(){

showPinnedOnly=!showPinnedOnly

render()

}

function render(){

const search=document.getElementById('search').value.toLowerCase()

const grid=document.getElementById('notesGrid')

grid.innerHTML=""

notes

.filter(n=>

(n.title.toLowerCase().includes(search) ||

n.content.toLowerCase().includes(search))

&& (!showPinnedOnly || n.pinned)

)

.sort((a,b)=>b.pinned-a.pinned)

.forEach(note=>{

const div=document.createElement('div')

div.className='note'

div.style.background=note.color

div.innerHTML=`

<h3>${note.pinned?'📌 ':''}${note.title}</h3>

<p>${note.content}</p>

<div class="note-footer">

<span>${note.date}</span>

<div>

<button class="pin-btn" onclick="togglePin(${note.id})">📌</button>
<button class="edit-btn" onclick="editNote(${note.id})">✏️</button>
<button class="delete-btn" onclick="deleteNote(${note.id})">🗑</button>

</div>

</div>

`

grid.appendChild(div)

})

}

function toggleDarkMode(){

document.body.classList.toggle('dark-mode')

localStorage.setItem(

'dark_mode_plus',

document.body.classList.contains('dark-mode')

)

}

if(localStorage.getItem('dark_mode_plus') === 'true'){

document.body.classList.add('dark-mode')

}

document.getElementById('search').addEventListener('input',render)

render()

updateStats()

</script>

</body>
</html>
